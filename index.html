<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Industrial PRO V30</title>
<style>
body {margin:0;font-family:Arial;background:#07131f;color:#ecf6ff;}
.center-box{display:flex;align-items:center;justify-content:center;height:100vh;}
.card{background:#0d2740;padding:25px;border-radius:12px;width:320px;box-shadow:0 0 20px rgba(0,0,0,0.5);}
input{width:100%;padding:10px;margin:8px 0;border-radius:6px;border:none;}
button{width:100%;padding:10px;margin-top:10px;border:none;border-radius:6px;background:#1bb55c;color:white;font-weight:bold;cursor:pointer;}
#app{display:none;padding:15px;}
.kpi{background:#133555;padding:20px;border-radius:10px;margin:10px;text-align:center;}
.kpi h1{font-size:40px;margin:0;}
</style>
</head>
<body>

<div id="login" class="center-box">
  <div class="card">
    <h2>Ingreso</h2>
    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
    <div id="loginMsg"></div>
  </div>
</div>

<div id="app">
  <h2>INDICADOR DE PRODUCCIÓN</h2>

  <div class="kpi">
    <h1 id="kpi1">--</h1>
    <div>Total Producción</div>
  </div>

  <button onclick="forzarRefresh()">🔄 Refrescar</button>
</div>

<script>
let URL_SCRIPT = localStorage.getItem("scriptURL") || "https://script.google.com/macros/s/AKfycbwlPyp1n7rt5MwcaqW9e6kGvw99Y49PrGXEqtmsaLCztazI-rwHSBc44hefgGCGnGw/exec";
let usuarioActivo = null;
let rolActivo = null;

function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;
  let url = URL_SCRIPT + "?action=login&user="+u+"&pass="+p+"&callback=loginOK";
  let script = document.createElement("script");
  script.src = url;
  document.body.appendChild(script);
}

function loginOK(res){
  if(res.status === "ok"){
    usuarioActivo = res.user;
    rolActivo = res.role;
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    iniciarSistema();
  } else {
    document.getElementById("loginMsg").innerText = res.message;
  }
}

function iniciarSistema(){
  cargarDatos();
  setInterval(()=>{cargarDatos();},60000);
  document.addEventListener("visibilitychange", ()=>{if(!document.hidden) cargarDatos();});
}

function cargarDatos(){
  document.getElementById("kpi1").innerText = Math.floor(Math.random()*1000);
}

function forzarRefresh(){cargarDatos();}

setInterval(()=>{console.log("alive");},30000);
</script>

</body>
</html>
